name = "anotether-relay"
main = "src/index.ts"
compatibility_date = "2024-03-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "ANOTETHER_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_NAMESPACE_ID"

[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"

[[migrations]]
tag = "v1"
new_classes = ["SessionDO"]

[vars]
SESSION_TTL_SECONDS = "86400"
MAX_MESSAGE_SIZE_BYTES = "65536"

RATE_LIMIT_SESSION_CREATE_PER_HOUR = "10"
RATE_LIMIT_MESSAGE_SEND_PER_MINUTE = "60"
RATE_LIMIT_MESSAGE_POLL_PER_MINUTE = "120"
RATE_LIMIT_SESSION_JOIN_PER_HOUR = "30"
